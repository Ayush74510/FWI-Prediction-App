<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FWI Prediction App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding: 20px;
        }

        /* --- Card Layout --- */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            color: #1e293b;
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
        }

        /* --- Form Grid --- */
        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            color: #3b82f6;
        }

        input, select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 14px;
            color: #334155;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus, select:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* --- Button --- */
        .btn-container {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        button:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* --- Feedback (Alerts & Spinner) --- */
        .spinner {
            display: none;
            margin: 20px auto 0;
            border: 4px solid #f1f5f9;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
        }

        .alert {
            margin-top: 25px;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            animation: slideUp 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .alert-success {
            background-color: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }

        .alert-danger {
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        /* --- Animations --- */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>Fire Weather Index Prediction</h1>
            <p class="subtitle">Enter the meteorological details below to generate an FWI forecast</p>
        </div>

        <form id="predictionForm" action="{{ url_for('predict_datapoint') }}" method="post">

            <div class="input-group">
                <label><i class="fas fa-temperature-high"></i> Temperature</label>
                <input type="number" step="any" name="Temperature" placeholder="e.g., 32 °C" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-tint"></i> Relative Humidity</label>
                <input type="number" step="any" name="RH" placeholder="e.g., 45 %" min="0" max="100" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-wind"></i> Wind Speed</label>
                <input type="number" step="any" name="Ws" placeholder="e.g., 15 km/h" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-cloud-showers-heavy"></i> Rain</label>
                <input type="number" step="any" name="Rain" placeholder="e.g., 0.5 mm" min="0" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-fire-alt"></i> FFMC</label>
                <input type="number" step="any" name="FFMC" placeholder="Fine Fuel Moisture Code" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-leaf"></i> DMC</label>
                <input type="number" step="any" name="DMC" placeholder="Duff Moisture Code" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-sun"></i> ISI</label>
                <input type="number" step="any" name="ISI" placeholder="Initial Spread Index" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-exclamation-triangle"></i> Fire Class</label>
                <select name="Classes" required>
                    <option value="" disabled selected>Select condition...</option>
                    <option value="0">Not Fire</option>
                    <option value="1">Fire</option>
                </select>
            </div>

            <div class="input-group">
                <label><i class="fas fa-map-marker-alt"></i> Region</label>
                <select name="Region" required>
                    <option value="" disabled selected>Select region...</option>
                    <option value="0">Bejaia</option>
                    <option value="1">Sidi-Bel Abbes</option>
                </select>
            </div>

            <div class="btn-container">
                <button type="submit" id="predictBtn">
                    <i class="fas fa-robot"></i> Run Prediction
                </button>
            </div>

        </form>

        <div class="spinner" id="loadingSpinner"></div>

        {% if result %}
        <div class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span><strong>FWI Prediction:</strong> {{ result }}</span>
        </div>
        {% endif %}

        {% if error %}
        <div class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

    </div>

    <script>
        const form = document.getElementById("predictionForm");
        const button = document.getElementById("predictBtn");
        const spinner = document.getElementById("loadingSpinner");

        form.addEventListener("submit", function() {
            // Change button state
            button.disabled = true;
            button.innerHTML = 'Predicting...';
            // Show spinner
            spinner.style.display = "block";
        });
    </script>

</body>
</html>
